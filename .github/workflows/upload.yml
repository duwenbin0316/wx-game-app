name: Upload to WeChat

on:
  push:
    branches:
      - master

env:
  APP_VERSION: 1.0.5
  TCB_ENV_ID: cloud1-8gt2mwuq5b21c8ab

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install -g miniprogram-ci@2.1.31 @cloudbase/cli

      - name: Deploy cloud function
        run: |
          tcb login --apiKeyId ${{ secrets.TENCENTCLOUD_SECRET_ID }} --apiKey ${{ secrets.TENCENTCLOUD_SECRET_KEY }}
          tcb fn deploy quickstartFunctions -e $TCB_ENV_ID --force

      - name: Inject version into code
        run: |
          sed -i "s/version: 'dev'/version: '$APP_VERSION'/" miniprogram/pages/online/index.js

      - name: Write private key
        run: echo "${{ secrets.WECHAT_PRIVATE_KEY }}" > private.wxe5b06e8c6ba926fc.key

      - name: Upload miniprogram
        run: |
          miniprogram-ci upload \
            --pp . \
            --pkp ./private.wxe5b06e8c6ba926fc.key \
            --appid wxe5b06e8c6ba926fc \
            --uv $APP_VERSION \
            -r 1 \
            --enable-es6 true
