name: Upload to WeChat

on:
  push:
    branches:
      - master
    paths:
      - 'miniprogram/**'
      - '.github/workflows/upload.yml'

env:
  APP_VERSION: 1.0.8

jobs:
  upload-miniprogram:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache miniprogram-ci
        id: cache-ci
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/node_modules
          key: npm-global-miniprogram-ci-2.1.31

      - name: Install miniprogram-ci
        if: steps.cache-ci.outputs.cache-hit != 'true'
        run: npm install -g miniprogram-ci@2.1.31

      - name: Inject version into code
        run: |
          sed -i "s/version: 'dev'/version: '$APP_VERSION'/" miniprogram/pages/online/index.js

      - name: Write private key
        run: echo "${{ secrets.WECHAT_PRIVATE_KEY }}" > private.wxe5b06e8c6ba926fc.key

      - name: Upload miniprogram
        run: |
          miniprogram-ci upload \
            --pp . \
            --pkp ./private.wxe5b06e8c6ba926fc.key \
            --appid wxe5b06e8c6ba926fc \
            --uv $APP_VERSION \
            -r 1 \
            --enable-es6 true
